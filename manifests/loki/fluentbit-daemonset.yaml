apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluentbit
  namespace: observability
  labels:
    app: fluentbit
spec:
  selector:
    matchLabels:
      app: fluentbit
  template:
    metadata:
      labels:
        app: fluentbit
    spec:
      serviceAccountName: fluentbit

      # Tolerancje — uruchamiaj na wszystkich węzłach (włącznie z master/control-plane)
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule

      containers:
        - name: fluentbit
          image: fluent/fluent-bit:3.2
          imagePullPolicy: IfNotPresent

          ports:
            - name: http-metrics
              containerPort: 2020
              protocol: TCP

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http-metrics
            initialDelaySeconds: 30
            periodSeconds: 30

          volumeMounts:
            # Konfiguracja Fluent Bit z ConfigMap
            - name: config
              mountPath: /fluent-bit/etc/fluent-bit.conf
              subPath: fluent-bit.conf
            - name: config
              mountPath: /fluent-bit/etc/parsers.conf
              subPath: parsers.conf

            # Logi kontenerów — symlinki → rzeczywiste pliki
            - name: varlog
              mountPath: /var/log
              readOnly: true

            # Rzeczywiste dane logów (containerd/docker)
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true

            # Baza danych pozycji (śledzi, gdzie skończyliśmy czytać)
            - name: fluentbit-db
              mountPath: /var/log/fluentbit

      volumes:
        - name: config
          configMap:
            name: fluentbit-config

        - name: varlog
          hostPath:
            path: /var/log

        # Dla Docker runtime
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers

        # Persist tail DB — bez tego po restarcie DaemonSet ponownie przetworzy stare logi
        - name: fluentbit-db
          hostPath:
            path: /var/log/fluentbit
            type: DirectoryOrCreate
