apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentbit-config
  namespace: observability
data:
  # -------------------------------------------------------
  # Główny plik konfiguracyjny
  # -------------------------------------------------------
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Daemon        Off
        Log_Level     info
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020

    # -------------------------------------------------------
    # INPUT — czytaj logi kontenerów z dysku węzła
    # -------------------------------------------------------
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        # Pomijaj logi infrastruktury K8s — interesuje nas tylko sprawdzsluch
        Exclude_Path      /var/log/containers/*kube-system*.log,/var/log/containers/*observability*.log
        Parser            cri
        DB                /var/log/fluentbit/fluentbit.db
        DB.Sync           Normal
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        Refresh_Interval  10
        Read_from_Head    False

    # -------------------------------------------------------
    # FILTER 1 — wzbogać logi o metadane K8s (namespace, pod, app label)
    # -------------------------------------------------------
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Merge_Log_Key       log_parsed
        Keep_Log            Off
        Annotations         Off
        Labels              On

    # -------------------------------------------------------
    # FILTER 2 — zostaw tylko namespace sprawdzsluch
    # -------------------------------------------------------
    [FILTER]
        Name    grep
        Match   kube.*
        Regex   kubernetes['namespace_name'] sprawdzsluch

    # -------------------------------------------------------
    # FILTER 3 — wynieś pole `level` z JSON logu na wierzchni poziom
    # (potrzebne jako label Loki)
    # -------------------------------------------------------
    [FILTER]
        Name          nest
        Match         kube.*
        Operation     lift
        Nested_under  log_parsed
        Add_prefix    parsed_

    [FILTER]
        Name    modify
        Match   kube.*
        # Jeśli parsed_level istnieje, przenieś do `level`
        Copy    parsed_level level
        # Jeśli parsed_testId istnieje, przenieś do `testId`
        Copy    parsed_testId testId
        # Jeśli parsed_correlationId — przenieś
        Copy    parsed_correlationId correlationId

    # -------------------------------------------------------
    # OUTPUT — push logów do Loki
    # -------------------------------------------------------
    [OUTPUT]
        Name            loki
        Match           kube.*
        Host            loki
        Port            3100
        Labels          job=fluentbit, namespace=$kubernetes['namespace_name'], app=$kubernetes['labels']['app'], level=$level
        Label_Keys      $testId, $correlationId
        Remove_Keys     parsed_level, parsed_testId, parsed_correlationId, kubernetes
        Line_Format     json
        # Retry w razie niedostępności Loki
        Retry_Limit     5

  # -------------------------------------------------------
  # Parsery
  # -------------------------------------------------------
  parsers.conf: |
    # Parser dla formatu CRI (containerd) — standard w K8s 1.20+
    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z

    # Parser JSON — dla naszych serwisów w trybie production (logback JSON encoder)
    [PARSER]
        Name        json
        Format      json
        Time_Key    @timestamp
        Time_Format %Y-%m-%dT%H:%M:%S.%LZ
        Time_Keep   On
